    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    elevenlabs-convai {
      position: fixed;
      right: 24px;
      bottom: 180px;
      max-height: 420px;
      z-index: 99999;
    }

    .mobile-assistant {
      display: none;
    }

    @media (max-width:640px) {

      elevenlabs-convai {
        display: none;
      }

      .mobile-assistant {
        display: grid;
        position: fixed;
        right: 14px;
        bottom: 140px;
        width: 56px;
        height: 56px;
        border-radius: 9999px;
        background: #1f4c41;
        color: #fff;
        border: none;
        font-size: 22px;
        place-items: center;
        z-index: 100000;
        box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .mobile-assistant:active {
        transform: translateY(1px);
      }

    }
  </style>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <!-- ELEVENLABS -->

  <elevenlabs-convai agent-id="agent_2101kfzp9g9deyd8462gp5q2dss9"></elevenlabs-convai>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async></script>

  <button class="mobile-assistant" aria-label="Поговорити з консультантом">
    📞
  </button>

  <script>

    (function () {

      if (window.matchMedia("(min-width:641px)").matches) return;

      const btn = document.querySelector(".mobile-assistant");
      const widget = document.querySelector("elevenlabs-convai");

      if (!btn || !widget) return;

      const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      async function tryStartCall() {

        const root = widget.shadowRoot;

        if (!root) return false;

        const buttons = root.querySelectorAll("button,[role='button']");

        for (const b of buttons) {

          const t = (b.textContent || "").toLowerCase();

          if (t.includes("start") || t.includes("поговор")) {

            b.click();
            return true;

          }

        }

        return false;

      }

      btn.addEventListener("click", async () => {

        for (let i = 0; i < 20; i++) {

          if (await tryStartCall()) break;

          await sleep(300);

        }

      });

    })();

  </script>

</body>

</html>
